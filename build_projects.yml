trigger:
- main
- next_stable
- 20*

pr:
  branches:
    include:
    - main
    - next_stable
    - 20*
  paths:
    exclude:
    - doc/**
    - '**/*.md'
    - '**/*.rst'

variables:
- group: noos_releases_group_variables
- name: isMain
  value: $[eq(variables['Build.SourceBranch'], 'refs/heads/main')]
- name: isNextStable
  value:  $[eq(variables['Build.SourceBranch'], 'refs/heads/next_stable')]
- name: isRelease
  value: $[contains(variables['Build.SourceBranch'], 'refs/heads/20')]

- ${{ if eq(variables['Build.Reason'], 'PullRequest')}}:
  - name: branch
    value: $(System.PullRequest.TargetBranchName)
- ${{ else }}:
  - name: branch
    value: $(Build.SourceBranchName)

jobs:
- job: Xilinx
  timeoutInMinutes: 400
  pool:
    name: Default
    demands:
      - agent.name -equals no-OS_xilinx
  steps:
  - checkout: self
    fetchDepth: 50
    submodules: true
    clean: true
    persistCredentials: true
  - script: 'echo "Using Xilinx version: $(XILINX_VERSION)"'
    displayName: 'Show Xilinx version'
  - script: |
      echo "Cleaning corrupted Xilinx build state..."
      for dir in /no-OS_builds/builds_main/build_xilinx_*/; do
        # If app/src/lscript.ld is missing but app/ exists, the project is corrupted
        if [ -d "$dir/app" ] && [ ! -f "$dir/app/src/lscript.ld" ]; then
          echo "Corrupted project detected: $dir (missing lscript.ld)"
          echo "  Removing $dir/app"
          rm -rf "$dir/app"
          if [ -d "$dir/.metadata" ]; then
            echo "  Removing $dir/.metadata"
            rm -rf "$dir/.metadata"
          fi
          if [ -f "$dir/.project.target" ]; then
            echo "  Removing $dir/.project.target"
            rm -f "$dir/.project.target"
          fi
        fi
        # For Zynq projects (zed/zc702/zc706): check if Xilinx.spec is missing
        if [ -f "$dir/app/src/lscript.ld" ] && [ ! -f "$dir/app/src/Xilinx.spec" ]; then
          # Check if this is a Zynq project (cortexa9)
          if [ -f "$dir/tmp/arch.txt" ] && grep -q "cortexa9" "$dir/tmp/arch.txt"; then
            echo "Zynq project missing Xilinx.spec: $dir"
            echo "  Copying Xilinx.spec from Vitis installation"
            # Use XILINX_VERSION pipeline variable since XILINX_VITIS env is not set yet
            SPEC_PATH="/tools/Xilinx/Vitis/$(XILINX_VERSION)/data/embeddedsw/scripts/specs/arm/Xilinx.spec"
            if [ -f "$SPEC_PATH" ]; then
              cp "$SPEC_PATH" "$dir/app/src/"
              echo "  Copied Xilinx.spec successfully"
            else
              echo "  WARNING: Could not find Xilinx.spec at $SPEC_PATH"
            fi
          fi
        fi
      done
    displayName: 'Clean corrupted Xilinx projects'
  - script: |
      export BRANCH=$(branch)
      wget -P ./tools/scripts/ \
        https://raw.githubusercontent.com/analogdevicesinc/wiki-scripts/refs/heads/main/utils/cloudsmith_utils/cloudsmith_helper.py && \
      python3 ./tools/scripts/build_projects.py $(Build.Repository.LocalPath) \
        -export_dir $(RELEASE_DIR) \
        -log_dir $(LOG_DIR) \
        -builds_dir /no-OS_builds/builds \
        -platform xilinx \
        -hdl_branch $(HDL_BRANCH)
    env:
      CLOUDSMITH_API_KEY: $(CLOUDSMITH_API_KEY)
      TOKEN: $(TOKEN)
    displayName: 'Run project build'
  - task: PublishPipelineArtifact@1
    timeoutInMinutes: 10
    condition: or(eq(variables.isMain, true), eq(variables.isNextStable, true), eq(variables.isRelease, true))
    inputs:
      targetPath: '$(Build.Repository.LocalPath)/$(RELEASE_DIR)'
      artifact: '$(ARTIFACT_NAME)_Xilinx'
      publishLocation: 'pipeline'
  - task: PublishPipelineArtifact@1
    condition: true
    inputs:
      targetPath: '$(Build.Repository.LocalPath)/$(LOG_DIR)'
      artifact: 'logs_Xilinx_$(System.JobId)'
      publishLocation: 'pipeline'

