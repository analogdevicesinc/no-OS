trigger:
- main
- next_stable
- 20*

pr:
  branches:
    include:
    - main
    - next_stable
    - 20*
  paths:
    exclude:
    - doc/**
    - '**/*.md'
    - '**/*.rst'

variables:
- group: noos_releases_group_variables
- name: isMain
  value: $[eq(variables['Build.SourceBranch'], 'refs/heads/main')]
- name: isNextStable
  value:  $[eq(variables['Build.SourceBranch'], 'refs/heads/next_stable')]
- name: isRelease
  value: $[contains(variables['Build.SourceBranch'], 'refs/heads/20')]

- ${{ if eq(variables['Build.Reason'], 'PullRequest')}}:
  - name: branch
    value: $(System.PullRequest.TargetBranchName)
- ${{ else }}:
  - name: branch
    value: $(Build.SourceBranchName)

jobs:
- job: Xilinx
  timeoutInMinutes: 200
  pool:
    name: Default
    demands:
      - agent.name -equals no-OS_xilinx
  steps:
  - checkout: self
    fetchDepth: 50
    submodules: true
    clean: true
    persistCredentials: true
  - script: 'echo "Using Xilinx version: $(XILINX_VERSION)"'
    displayName: 'Show Xilinx version'
  - script: |
      echo "=== Debug: Environment ==="
      echo "XILINX_VITIS=$XILINX_VITIS"
      echo "XILINX_VERSION=$(XILINX_VERSION)"
      echo ""
      echo "=== Debug: Searching for Xilinx.spec ==="
      find /opt/Xilinx -name "Xilinx.spec" 2>/dev/null || echo "Not found in /opt/Xilinx"
      find /tools/Xilinx -name "Xilinx.spec" 2>/dev/null || echo "Not found in /tools/Xilinx"
      if [ -n "$XILINX_VITIS" ]; then
        echo "Checking XILINX_VITIS path: $XILINX_VITIS"
        ls -la "$XILINX_VITIS/../data/embeddedsw/scripts/specs/arm/" 2>/dev/null || echo "Path not found"
      fi
      echo ""
      echo "Cleaning stale Eclipse state and build locks..."
      for dir in /no-OS_builds/builds_main/build_xilinx_*/; do
        # Remove .metadata (corrupted Eclipse workspace state)
        if [ -d "$dir/.metadata" ]; then
          echo "Removing $dir/.metadata"
          rm -rf "$dir/.metadata"
        fi
        # Remove .project.target (build lock - forces project recreation)
        if [ -f "$dir/.project.target" ]; then
          echo "Removing $dir/.project.target"
          rm -f "$dir/.project.target"
        fi
      done
      export BRANCH=$(branch)
      wget -P ./tools/scripts/ \
        https://raw.githubusercontent.com/analogdevicesinc/wiki-scripts/refs/heads/main/utils/cloudsmith_utils/cloudsmith_helper.py && \
      python3 ./tools/scripts/build_projects.py $(Build.Repository.LocalPath) \
        -export_dir $(RELEASE_DIR) \
        -log_dir $(LOG_DIR) \
        -builds_dir /no-OS_builds/builds \
        -platform xilinx \
        -hdl_branch $(HDL_BRANCH)
    env:
      CLOUDSMITH_API_KEY: $(CLOUDSMITH_API_KEY)
      TOKEN: $(TOKEN)
      BLACKLIST_URL: $(BLACKLIST_URL)
    displayName: 'Run project build'
  - task: PublishPipelineArtifact@1
    timeoutInMinutes: 10
    condition: or(eq(variables.isMain, true), eq(variables.isNextStable, true), eq(variables.isRelease, true))
    inputs:
      targetPath: '$(Build.Repository.LocalPath)/$(RELEASE_DIR)'
      artifact: '$(ARTIFACT_NAME)_Xilinx'
      publishLocation: 'pipeline'
  - task: PublishPipelineArtifact@1
    condition: true
    inputs:
      targetPath: '$(Build.Repository.LocalPath)/$(LOG_DIR)'
      artifact: 'logs_Xilinx_$(System.JobId)'
      publishLocation: 'pipeline'

