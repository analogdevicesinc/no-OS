# PQMON Shared Configuration
# Common settings for both master and slave boards
# Board-specific overrides in prj_master.conf / prj_slave.conf

# Basic Configuration
CONFIG_GPIO=y
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_PRINTK=y

# SPI for ADIN1110 + ADE9430
CONFIG_SPI=y

# Enhanced Networking Stack for PTP
CONFIG_NETWORKING=y
CONFIG_NET_L2_ETHERNET=y
CONFIG_NET_IPV4=y
CONFIG_NET_IPV6=n
CONFIG_NET_UDP=y
CONFIG_NET_SOCKETS=y
CONFIG_POSIX_API=y

# Ethernet Driver for ADIN1110
CONFIG_ETH_ADIN2111=y
CONFIG_ETH_ADIN2111_SPI_CFG0=y
CONFIG_ETH_ADIN2111_TIMEOUT=1000

# === FULL ZEPHYR PTP SUBSYSTEM ===
CONFIG_PTP=y
CONFIG_PTP_CLOCK=y
CONFIG_PTP_CLOCK_INIT_PRIORITY=85

# PTP Protocol Configuration
CONFIG_PTP_ORDINARY_CLOCK=y
CONFIG_PTP_CLOCK_ACCURACY_100NS=y

# Network Packet Timestamping (CRITICAL for hardware timestamps)
CONFIG_NET_PKT_TIMESTAMP=y
CONFIG_NET_PKT_TIMESTAMP_THREAD=y
CONFIG_NET_PKT_TXTIME=y

# Logging
CONFIG_LOG=y
CONFIG_LOG_MAX_LEVEL=4
CONFIG_LOG_MODE_DEFERRED=y
CONFIG_ETHERNET_LOG_LEVEL_WRN=y
CONFIG_PTP_LOG_LEVEL_INF=y
CONFIG_NET_LOG=y

# Network Buffer Configuration
CONFIG_NET_BUF_RX_COUNT=32
CONFIG_NET_BUF_TX_COUNT=32
CONFIG_NET_PKT_RX_COUNT=32
CONFIG_NET_PKT_TX_COUNT=32
CONFIG_NET_MAX_CONTEXTS=10

# Stack sizes - larger for PQLib processing
CONFIG_MAIN_STACK_SIZE=8192
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096

# Random number generator
# TEST_RANDOM_GENERATOR: non-cryptographic PRNG, sufficient for PTP
# (random port IDs). A production device with hardware RNG would use
# CONFIG_ENTROPY_HAS_DRIVER instead.
CONFIG_TEST_RANDOM_GENERATOR=y
CONFIG_ENTROPY_GENERATOR=y

# Memory Configuration - larger for PQLib
CONFIG_HEAP_MEM_POOL_SIZE=16384
# C library heap for iiod calloc (~7KB iiod_desc struct)
CONFIG_COMMON_LIBC_MALLOC_ARENA_SIZE=16384

# Static Network Configuration (common)
CONFIG_NET_CONFIG_SETTINGS=y
CONFIG_NET_CONFIG_NEED_IPV4=y
CONFIG_NET_CONFIG_MY_IPV4_NETMASK="255.255.255.0"
CONFIG_NET_CONFIG_MY_IPV4_GW="192.0.2.1"

# I2C for MAX31343 RTC
CONFIG_I2C=y
CONFIG_RTC=y

# Disable init priority checking — required because our custom PTP clock
# driver (adin1110_ptp_clock) uses init_priority=85 which must come after
# the ADIN1110 ethernet driver (init_priority=80), but the checker flags
# the DT parent-child relationship as a priority violation.
CONFIG_CHECK_INIT_PRIORITIES=n

# === CMSIS-DSP for PQLib ===
CONFIG_CMSIS_DSP=y
CONFIG_CMSIS_DSP_TRANSFORM=y
CONFIG_CMSIS_DSP_COMPLEXMATH=y
CONFIG_CMSIS_DSP_BASICMATH=y
CONFIG_CMSIS_DSP_FASTMATH=y
CONFIG_CMSIS_DSP_STATISTICS=y
CONFIG_CMSIS_DSP_FILTERING=y

# Float support for printf
CONFIG_CBPRINTF_FP_SUPPORT=y

# Hardware FPU - softabi to match PQLib .a (compiled without hard-float)
CONFIG_FPU=y
CONFIG_FP_SOFTABI=y

# Flash + NVS for calibration storage
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_NVS=y

# IIO Transport: TCP over T1L
CONFIG_NET_TCP=y
CONFIG_NET_CONTEXT_RCVTIMEO=y
CONFIG_NET_MAX_CONN=16
CONFIG_NET_TCP_TIME_WAIT_DELAY=250

# IIO Transport on USB
CONFIG_IIO_TRANSPORT_USB=y
CONFIG_USB_DEVICE_STACK_NEXT=y
CONFIG_USBD_CDC_ACM_CLASS=y

# Suppress Zephyr subsystem log noise
CONFIG_USBD_LOG_LEVEL_ERR=y
CONFIG_USBD_CDC_ACM_LOG_LEVEL_ERR=y
CONFIG_UDC_DRIVER_LOG_LEVEL_ERR=y
CONFIG_PHY_LOG_LEVEL_WRN=y
CONFIG_NVS_LOG_LEVEL_WRN=y
