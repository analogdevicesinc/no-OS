# Dual-core IMU example configuration for MAX78000
#
# RISC-V (CPU1) bit-bangs an ADIS16577-2 IMU on the SPI0 pins and publishes raw samples;
# ARM (CPU0) reads an ADXL345 on the same bus, integrates gyro angles, and logs both.
#
# Usage:
#   cmake --preset max78000fthr -DPROJECT_DEFCONFIG=max78000/imu_dual_core.conf

# Enable required APIs
CONFIG_UART=y
CONFIG_IRQ=y
CONFIG_GPIO=y
CONFIG_GPIO_MAXIM=y
CONFIG_SPI=y
# Both cores share the bus via the reusable bit-banged (GPIO) SPI driver.
CONFIG_SPI_GPIO_MAXIM=y
# Shared __wrap_MXC_SYS_Reset_Periph (protects the SEMA bus lock from the SDK's
# destructive peripheral-reset store).
CONFIG_SYS_MAXIM=y
# The Maxim SPI driver references the no_os_dma API unconditionally.
CONFIG_DMA=y
# The ADXL345 driver carries I2C and SPI init paths; this example uses SPI.
CONFIG_I2C=y

# Coprocessor and IPC support
CONFIG_COPROCESSOR=y
CONFIG_IPC_MAXIM=y
CONFIG_COPROCESSOR_MAXIM=y

# ADXL345 accelerometer driver
CONFIG_ACCEL=y
CONFIG_ACCEL_ADXL345=y

# ADIS16577-2 IMU driver (adis1657x family)
CONFIG_IMU=y
CONFIG_IMU_ADIS=y
CONFIG_IMU_ADIS1657X=y

# Select the dual-core IMU example
CONFIG_MAX78000_IMU_DUAL_CORE_EXAMPLE=y
