# Single-core dual-IMU example configuration for MAX78000
#
# ARM (CPU0) drives both the ADIS16577-2 (SPI0, CS = GPIO P0.11) and the ADXL345
# (SPI0, CS = GPIO P0.19) directly with no RISC-V involvement.
#
# Usage:
#   cmake --preset max78000fthr -DPROJECT_DEFCONFIG=max78000/imu_single_core.conf

# Enable required APIs
CONFIG_UART=y
CONFIG_IRQ=y
CONFIG_GPIO=y
CONFIG_SPI=y
CONFIG_DMA=y
CONFIG_I2C=y

# ADXL345 accelerometer driver
CONFIG_ACCEL=y
CONFIG_ACCEL_ADXL345=y

# ADIS16577-2 IMU driver (adis1657x family)
CONFIG_IMU=y
CONFIG_IMU_ADIS=y
CONFIG_IMU_ADIS1657X=y

# Select the single-core IMU example
CONFIG_MAX78000_IMU_SINGLE_CORE_EXAMPLE=y
