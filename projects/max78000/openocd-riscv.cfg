# MAX78000 RISC-V Core Debug Configuration
# Adapter: SEGGER J-Link (USB 1366:0105) via JTAG
#
# MUST use the Maxim SDK OpenOCD (has rvmax target type + MAX78000 scripts):
#   ~/MaximSDK/Tools/OpenOCD/bin/openocd \
#     -s ~/MaximSDK/Tools/OpenOCD/scripts \
#     -f projects/max78000/openocd-riscv.cfg
#
# The ARM firmware must already be running and have called no_os_coprocessor_boot()
# before this script is run -- that sequence enables the RV JTAG GPIO pins
# (gpio_cfg_rv_jtag) and releases the RISC-V from reset.

# Port config must come before init. These match riscv.gdbinit (gdb on 3334).
gdb_port 3334
telnet_port 4445
tcl_port 6667

source [find interface/jlink.cfg]

transport select jtag

# max78000_riscv.cfg sets adapter speed 4000, reset_config srst_only, srst_delay 100.
# We override speed to 1000 kHz for cable headroom.
source [find target/max78000_riscv.cfg]

adapter speed 1000

init

# Do NOT use 'reset halt' here.  SRST resets the entire chip; the ARM then needs
# its full init sequence (clock, UART, IPC, coprocessor boot, GPIO mux for JTAG)
# before the RV DM is accessible -- that takes several hundred ms, far beyond the
# 100 ms srst_delay.  Since the ARM firmware is already running with the JTAG pins
# live, send a direct software halt to the RV DM instead.
halt
