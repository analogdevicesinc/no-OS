# Dual-core example configuration for MAX78000
#
# Usage:
#   cmake --preset max78000fthr -DPROJECT_DEFCONFIG=max78000/dual_core.conf

# Enable required APIs
CONFIG_UART=y
CONFIG_IRQ=y
CONFIG_GPIO=y

# Enable coprocessor and IPC support
CONFIG_COPROCESSOR=y
CONFIG_IPC_MAXIM=y
CONFIG_COPROCESSOR_MAXIM=y

# Select dual-core example
CONFIG_MAX78000_DUAL_CORE_EXAMPLE=y
